name = "mail"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "e938c8d7-bfbd-4b3f-bb9d-1a9038f166e1" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="lqu0060"
ADMIN_PASSWORD="147258369"
GUEST_PASSWORD="guest"
JWT_TOKEN="147258369"
JWT_TOKENGUEST_PASSWORD="147258369"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="147258369"
RESEND_API_KEY="147258369"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true